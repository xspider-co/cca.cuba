<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --cream: #f5f0e8;
    --navy: #0d1b2a;
    --white: #ffffff;
    --sand-dark: #e8e0d0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--cream);
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(13, 27, 42, 0.08);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 2.5vw, 26px);
    letter-spacing: 0.12em;
    color: var(--navy);
    text-decoration: none;
  }

  .nav-ig {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--navy);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .nav-ig:hover { opacity: 1; }

  .nav-ig svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* ── HERO ── */
  #hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 500px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

 /* CORRECCIÓN PARA MÓVIL */
 background-size: cover; /* Mantiene la proporción original siempre */
  background-position: center;
  background-repeat: no-repeat;
  
  /* Animación a 13s como pediste */
  animation: oceanBreathe 13s ease-in-out infinite;
  
  /* Evita que se vea borroso al escalar */
  backface-visibility: hidden;
  will-change: transform;
}

  @keyframes heroReveal {
    from { transform: scale(1.12); opacity: 0.6; }
    to   { transform: scale(1.04); opacity: 1; }
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    display: none;
    background: linear-gradient(
      to bottom,
      rgba(13, 27, 42, 0.18) 0%,
      rgba(13, 27, 42, 0.05) 40%,
      rgba(13, 27, 42, 0.32) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-eyebrow {
    font-size: clamp(10px, 1.4vw, 13px);
    font-weight: 500;
    letter-spacing: 0.38em;
    color: rgba(255,255,255,0.72);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 130px);
    letter-spacing: 0.06em;
    line-height: 0.92;
    color: var(--white);
    text-shadow: 0 2px 40px rgba(0,0,0,0.22);
  }

  .hero-title span {
    display: block;
  }

  .hero-line {
    width: 1px;
    height: 60px;
    background: rgba(255,255,255,0.4);
    margin: 36px auto 0;
    animation: lineGrow 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
    transform-origin: top;
  }

  @keyframes lineGrow {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }

  /* ── COUNTDOWN ── */
  #countdown {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 100px 40px 80px;
  }

  .cd-bg-fade {
    position: absolute;
    inset: 0;
    background: rgba(245, 240, 232, 0.82);
  }

  .cd-content {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    max-width: 700px;
  }

  .cd-date-label {
    font-size: clamp(10px, 1.2vw, 12px);
    font-weight: 500;
    letter-spacing: 0.42em;
    color: var(--navy);
    opacity: 0.45;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .cd-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    letter-spacing: 0.08em;
    color: var(--navy);
    margin-bottom: 64px;
    line-height: 1;
  }

  .timer {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: clamp(20px, 4vw, 56px);
  }

  .timer-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .timer-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 112px);
    line-height: 1;
    color: var(--navy);
    letter-spacing: 0.02em;
    min-width: clamp(60px, 10vw, 120px);
    text-align: center;
  }

  .timer-label {
    font-size: clamp(9px, 1vw, 11px);
    font-weight: 500;
    letter-spacing: 0.38em;
    color: var(--navy);
    opacity: 0.4;
    text-transform: uppercase;
  }

  @keyframes oceanBreathe {
  0% {
    transform: scale(1) translateX(0);
    background-position: center;
  }
  33% {
    /* Aumentamos un poco el desplazamiento lateral */
    transform: scale(1.07) translateX(-2%);
    background-position: 51% 49%;
  }
  66% {
    transform: scale(1.04) translateX(2%);
    background-position: 49% 51%;
  }
  100% {
    transform: scale(1) translateX(0);
    background-position: center;
  }
}
  .timer-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 7vw, 90px);
    color: var(--navy);
    opacity: 0.15;
    line-height: 1;
    padding-top: 4px;
    user-select: none;
  }

  .cd-divider {
    width: 48px;
    height: 1px;
    background: var(--navy);
    opacity: 0.18;
    margin: 60px auto;
  }

  .cd-info {
    font-size: clamp(10px, 1.3vw, 12px);
    font-weight: 500;
    letter-spacing: 0.34em;
    color: var(--navy);
    opacity: 0.5;
    text-transform: uppercase;
    line-height: 1.9;
  }

  /* ── FOOTER ── */
  footer {
    padding: 24px 40px;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-text {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.28);
    text-transform: uppercase;
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    nav { padding: 0 20px; }

    .hero-eyebrow { letter-spacing: 0.22em; }

    #countdown { padding: 90px 24px 70px; }

    .timer { gap: 14px; }

    .timer-sep { display: none; }

    footer { padding: 20px 24px; }
  }
</style>
</head>

        <div class="timer-number" id="minutes">00</div>
        <div class="timer-label">Minutos</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-number" id="seconds">00</div>
        <div class="timer-label">Segundos</div>
      </div>

<footer>
  <p class="footer-text">© 2026 Cuba Content Awards </p>
</footer>

<script>
  // Target: May 1, 2026 00:00:00 UTC-5 (Cuba)
  const target = new Date('2026-05-01T05:00:00Z').getTime();

  function pad(n) {
    return String(Math.floor(n)).padStart(2, '0');
  }

  function tick() {
    const now = Date.now();
    let diff = target - now;

    if (diff <= 0) {
      document.getElementById('days').textContent    = '00';
      document.getElementById('hours').textContent   = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      return;
    }

    const d = Math.floor(diff / 86400000);
    diff -= d * 86400000;
    const h = Math.floor(diff / 3600000);
    diff -= h * 3600000;
    const m = Math.floor(diff / 60000);
    diff -= m * 60000;
    const s = Math.floor(diff / 1000);

    document.getElementById('days').textContent    = pad(d);
    document.getElementById('hours').textContent   = pad(h);
    document.getElementById('minutes').textContent = pad(m);
    document.getElementById('seconds').textContent = pad(s);
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
