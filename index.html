<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuba Content Awards — CCA 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --cream: #f5f0e8;
    --navy: #0d1b2a;
    --white: #ffffff;
    --sand-dark: #e8e0d0;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--cream);
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(13, 27, 42, 0.08);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 2.5vw, 26px);
    letter-spacing: 0.12em;
    color: var(--navy);
    text-decoration: none;
  }

  .nav-ig {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--navy);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .nav-ig:hover { opacity: 1; }

  .nav-ig svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* ── HERO ── */
  #hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 500px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-bg {
  position: absolute;
  inset: 0;
  /* Así de corto queda ahora */
  background-image: url('agua.jpeg'); 
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  
  /* Tu animación de 13s corregida para móvil */
  animation: oceanBreathe 13s ease-in-out infinite;
  backface-visibility: hidden;
  will-change: transform;
}

  @keyframes heroReveal {
    from { transform: scale(1.12); opacity: 0.6; }
    to   { transform: scale(1.04); opacity: 1; }
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    display: none;
    background: linear-gradient(
      to bottom,
      rgba(13, 27, 42, 0.18) 0%,
      rgba(13, 27, 42, 0.05) 40%,
      rgba(13, 27, 42, 0.32) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-eyebrow {
    font-size: clamp(10px, 1.4vw, 13px);
    font-weight: 500;
    letter-spacing: 0.38em;
    color: rgba(255,255,255,0.72);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 130px);
    letter-spacing: 0.06em;
    line-height: 1.1;
    color: var(--white);
    text-shadow: 0 2px 40px rgba(0,0,0,0.22);
  }

  .hero-title span {
    display: block;
  }

  .hero-line {
    width: 1px;
    height: 60px;
    background: rgba(255,255,255,0.4);
    margin: 36px auto 0;
    animation: lineGrow 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
    transform-origin: top;
  }

  @keyframes lineGrow {
    from { transform: scaleY(0); opacity: 0; }
    to   { transform: scaleY(1); opacity: 1; }
  }

/* Contenedor principal */
#countdown {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background-color: var(--cream); /* Color base de seguridad */
}
/* La imagen de arena: Ajuste de nitidez */
.cd-bg {
  position: absolute;
  inset: 0;
  background-image: url('arena.jpeg');
  background-size: cover;
  background-position: center;
  opacity: 0.5; /* Sube a 0.7 si quieres que se vea aún más fuerte */
  z-index: 0;
}

/* Para que el texto no se pierda con la arena */
.countdown .container {
  position: relative;
  z-index: 1;
}

/* El degradado/tinte: ¡Cuidado aquí! */
.cd-bg-fade {
  position: absolute;
  inset: 0;
  /* Hacemos que el color crema sea muy transparente para que deje pasar la textura */
  background: rgba(245, 240, 232, 0.4); 
  z-index: 1;
}

/* El contenido: Lo movemos al frente */
.cd-content-wrapper {
  position: relative;
  z-index: 2; /* Por encima de la arena y del fade */
  text-align: center;
  width: 100%;
  max-width: 700px;
}

  .cd-date-label {
    font-size: clamp(10px, 1.2vw, 12px);
    font-weight: 500;
    letter-spacing: 0.42em;
    color: var(--navy);
    opacity: 0.45;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .cd-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    letter-spacing: 0.08em;
    color: var(--navy);
    margin-bottom: 64px;
    line-height: 1;
  }

  .timer {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: clamp(20px, 4vw, 56px);
  }

  .timer-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .timer-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 112px);
    line-height: 1;
    color: var(--navy);
    letter-spacing: 0.02em;
    min-width: clamp(60px, 10vw, 120px);
    text-align: center;
  }

  .timer-label {
    font-size: clamp(9px, 1vw, 11px);
    font-weight: 500;
    letter-spacing: 0.38em;
    color: var(--navy);
    opacity: 0.4;
    text-transform: uppercase;
  }

  @keyframes oceanBreathe {
  0% {
    transform: scale(1) translateX(0);
    background-position: center;
  }
  33% {
    /* Aumentamos un poco el desplazamiento lateral */
    transform: scale(1.07) translateX(-2%);
    background-position: 51% 49%;
  }
  66% {
    transform: scale(1.04) translateX(2%);
    background-position: 49% 51%;
  }
  100% {
    transform: scale(1) translateX(0);
    background-position: center;
  }
}
  .timer-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 7vw, 90px);
    color: var(--navy);
    opacity: 0.15;
    line-height: 1;
    padding-top: 4px;
    user-select: none;
  }

  .cd-divider {
    width: 48px;
    height: 1px;
    background: var(--navy);
    opacity: 0.18;
    margin: 60px auto;
  }

  .cd-info {
    font-size: clamp(10px, 1.3vw, 12px);
    font-weight: 500;
    letter-spacing: 0.34em;
    color: var(--navy);
    opacity: 0.5;
    text-transform: uppercase;
    line-height: 1.9;
  }

  /* ── INSCRIPCIONES BANNER ── */
  #inscripciones {
    background: var(--navy);
    padding: 52px 40px;
    text-align: center;
  }

  .insc-eyebrow {
    font-size: clamp(9px, 1.1vw, 11px);
    font-weight: 500;
    letter-spacing: 0.42em;
    color: rgba(245,240,232,0.45);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .insc-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4vw, 48px);
    letter-spacing: 0.08em;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 10px;
  }

  .insc-date {
    font-size: clamp(11px, 1.3vw, 13px);
    font-weight: 300;
    letter-spacing: 0.22em;
    color: rgba(245,240,232,0.55);
    text-transform: uppercase;
  }

  /* ── CATEGORÍAS ── */
  #categorias {
    position: relative;
    overflow: hidden;
    background-color: var(--cream);
  }

  .cat-bg {
    position: absolute;
    inset: 0;
    background-image: url('arena.jpeg');
    background-size: cover;
    background-position: center;
    opacity: 0.5;
    z-index: 0;
  }

  .cat-bg-fade {
    position: absolute;
    inset: 0;
    background: rgba(245, 240, 232, 0.4);
    z-index: 1;
  }

  .cat-content-wrapper {
    position: relative;
    z-index: 2;
    max-width: 820px;
    margin: 0 auto;
    padding: 100px 40px 110px;
    text-align: center;
  }

  .cat-date-label {
    font-size: clamp(10px, 1.2vw, 12px);
    font-weight: 500;
    letter-spacing: 0.42em;
    color: var(--navy);
    opacity: 0.45;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .cat-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    letter-spacing: 0.08em;
    color: var(--navy);
    margin-bottom: 64px;
    line-height: 1;
  }

  .categories-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: rgba(13, 27, 42, 0.12);
    border: 1px solid rgba(13, 27, 42, 0.12);
    text-align: left;
  }

  .cat-item {
    background: rgba(245, 240, 232, 0.82);
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    transition: background 0.2s;
  }

  .cat-item:hover { background: rgba(245, 240, 232, 0.97); }

  .cat-item.just-revealed {
    animation: catReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes catReveal {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--navy);
    opacity: 0.25;
    flex-shrink: 0;
    min-width: 24px;
  }

  .cat-name {
    font-size: clamp(10px, 1.3vw, 12px);
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--navy);
    line-height: 1.4;
    text-transform: uppercase;
  }

  /* ── LOCKED ── */
  .cat-item.locked {
    background: rgba(13, 27, 42, 0.04);
    cursor: default;
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .cat-item.locked:hover { background: rgba(13, 27, 42, 0.04); }
  .cat-item.locked .cat-num { opacity: 0.12; }

  .cat-locked-top {
    display: flex;
    align-items: center;
    gap: 18px;
    width: 100%;
  }

  .cat-redacted {
    height: 8px;
    border-radius: 2px;
    background: rgba(13, 27, 42, 0.10);
    flex: 1;
  }

  .cat-reveal-date {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.36em;
    color: var(--navy);
    opacity: 0.28;
    text-transform: uppercase;
    padding-left: 42px;
  }

  .cat-divider {
    width: 48px;
    height: 1px;
    background: var(--navy);
    opacity: 0.18;
    margin: 60px auto;
  }

  .cat-ig {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--navy);
    font-size: clamp(9px, 1.1vw, 11px);
    font-weight: 500;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    opacity: 0.45;
    transition: opacity 0.2s;
  }

  .cat-ig:hover { opacity: 0.75; }

  .cat-ig svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  footer {
    padding: 24px 40px;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .footer-text {
    font-size: 11px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.28);
    text-transform: uppercase;
  }

/* ── MOBILE ── */
@media (max-width: 600px) {
    nav { padding: 0 20px; }

    #hero {
      height: auto;
      min-height: 100vh;
      padding: 160px 20px 100px;
    }

    .hero-title {
      font-size: clamp(46px, 14vw, 58px);
      line-height: 1.1;
      margin-top: 20px;
    }

    .hero-eyebrow { 
      letter-spacing: 0.22em;
      margin-bottom: 10px;
    }

    #inscripciones { padding: 40px 24px; }

    .cat-content-wrapper { padding: 80px 24px 90px; }

    .categories-grid { grid-template-columns: 1fr; }

    .cat-item { padding: 18px 20px; }

    footer { padding: 20px 24px; }
  }

</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">Cuba Content Awards </a>
  <a class="nav-ig" href="https://www.instagram.com/cca.cuba" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
    </svg>
    @cca.cuba
  </a>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">CCA · 2026</p>
    <h1 class="hero-title">
      <span>Cuba</span>
      <span>Content</span>
      <span>Awards</span>
    </h1>
    <div class="hero-line"></div>
  </div>
</section>

<!-- INSCRIPCIONES -->
<section id="inscripciones">
  <p class="insc-eyebrow">Convocatoria · CCA 2026</p>
  <h2 class="insc-title">Inscripciones abiertas<br>10 de mayo</h2>
  <p class="insc-date">Abre la convocatoria para creadores de todas las categorías</p>
</section>

<!-- CATEGORÍAS -->
<section id="categorias">
  <div class="cat-bg"></div>
  <div class="cat-bg-fade"></div>

  <div class="cat-content-wrapper">
    <p class="cat-date-label">CCA 2026</p>
    <h2 class="cat-title">Categorías</h2>

    <div class="categories-grid" id="categoriesGrid"></div>

    <div class="cat-divider"></div>

    <a class="cat-ig" href="https://www.instagram.com/cca.cuba" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
      Síguenos en @cca.cuba · Toda la información en Instagram
    </a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p class="footer-text">© 2026 Cuba Content Awards </p>
</footer>

<script>
  // Cuba (CDT) = UTC-4 en mayo
  // Revelación cada día a las 20:00h Cuba = 00:00 UTC del día siguiente
  // Día 1 → 5 mayo 20:00 Cuba = 6 mayo 00:00 UTC → '2026-05-06T00:00:00Z'

  const CATEGORIES = [
    { name: 'Mejor Creador de Contenido del Año',           revealUTC: '2026-05-06T00:00:00Z', label: '5 de mayo' },
    { name: 'Mejor Contenido de Humor del Año',             revealUTC: '2026-05-07T00:00:00Z', label: '6 de mayo' },
    { name: 'Mejor Contenido de Belleza',                   revealUTC: '2026-05-08T00:00:00Z', label: '7 de mayo' },
    { name: 'Mejor Contenido Fitness',                      revealUTC: '2026-05-09T00:00:00Z', label: '8 de mayo' },
    { name: 'Revelación del Año',                           revealUTC: '2026-05-10T00:00:00Z', label: '9 de mayo' },
    { name: 'Mejor Creador de Contenido en Youtube del Año',revealUTC: '2026-05-11T00:00:00Z', label: '10 de mayo' },
    { name: 'Creador de Impacto Social',                    revealUTC: '2026-05-12T00:00:00Z', label: '11 de mayo' },
    { name: 'Mejor Creador de Contenido de Cocina',         revealUTC: '2026-05-13T00:00:00Z', label: '12 de mayo' },
    { name: 'Mejor Creador de Contenido de Viajes',         revealUTC: '2026-05-14T00:00:00Z', label: '13 de mayo' },
    { name: 'Mejor Creador de Contenido de Estilo de Vida', revealUTC: '2026-05-15T00:00:00Z', label: '14 de mayo' },
  ];

  function renderCategories() {
    const now = Date.now();
    const grid = document.getElementById('categoriesGrid');
    grid.innerHTML = '';

    CATEGORIES.forEach((cat, i) => {
      const revealTime = new Date(cat.revealUTC).getTime();
      const isRevealed = now >= revealTime;
      const num = String(i + 1).padStart(2, '0');

      const item = document.createElement('div');

      if (isRevealed) {
        item.className = 'cat-item';
        item.innerHTML = `
          <span class="cat-num">${num}</span>
          <span class="cat-name">${cat.name}</span>
        `;
      } else {
        item.className = 'cat-item locked';
        item.innerHTML = `
          <div class="cat-locked-top">
            <span class="cat-num">${num}</span>
            <div class="cat-redacted"></div>
          </div>
          <span class="cat-reveal-date">Se revela el ${cat.label}</span>
        `;
      }

      grid.appendChild(item);
    });
  }

  renderCategories();

  // Recheck every minute — when a reveal time passes, it updates live
  setInterval(renderCategories, 60000);
</script>

</body>
</html>
